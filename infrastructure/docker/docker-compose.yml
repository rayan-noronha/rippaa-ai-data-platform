services:
  # ─────────────────────────────────────────────
  # PostgreSQL with pgvector extension
  # ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rippaa-postgres
    environment:
      POSTGRES_USER: rippaa
      POSTGRES_PASSWORD: rippaa_dev
      POSTGRES_DB: rippaa_platform
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rippaa -d rippaa_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Apache Kafka (via KRaft mode — no Zookeeper)
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: rippaa-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: rippaa-dev-cluster-001
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # Kafka UI — browse topics and messages
  # ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: rippaa-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: rippaa-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8080:8080"

  # ─────────────────────────────────────────────
  # LocalStack — S3 emulation for local dev
  # ─────────────────────────────────────────────
  localstack:
    image: localstack/localstack:3.8
    container_name: rippaa-localstack
    environment:
      SERVICES: s3
      DEFAULT_REGION: ap-southeast-2
      EAGER_SERVICE_LOADING: 1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Prometheus — metrics collection
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: rippaa-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # ─────────────────────────────────────────────
  # Grafana — dashboards and visualisation
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.2
    container_name: rippaa-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: rippaa_dev
      GF_AUTH_ANONYMOUS_ENABLED: true
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  localstack_data:
